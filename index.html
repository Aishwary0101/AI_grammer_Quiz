<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Grammar Guardian</title>
</head>
<body>
    <div class="bento-grid">
        <div class="card lesson-card">
            <h2>Grammar of the Day</h2>
            <p id="lesson-text">Loading...</p>
        </div>

        <div class="card progress-card">
            <h3>Weekly Streak</h3>
            <div class="streak-data">🔥 5 Days</div>
        </div>

        <div class="card quiz-card">
            <h3>Quick Quiz</h3>
            <button onclick="startQuiz()">Start Challenge</button>
        </div>

        <div class="card history-card">
            <h3>Grammar History</h3>
            <ul>
                <li>Adjective vs Adverb</li>
                <li>Present Perfect</li>
            </ul>
        </div>

        <div class="card leaderboard-card">
            <h3>Top Learners</h3>
            <p>1. Aishwary - 1200 pts</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
